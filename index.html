<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexon Core AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Glassmorphism Theme Overrides */
        body {
            background: radial-gradient(circle at 50% 50%, #1a1528 0%, #09070f 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(25, 18, 41, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            outline: none;
        }

        /* Custom Scrollbar for Chat */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.4);
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4 sm:p-6">

    <div class="glass-panel w-full max-w-5xl h-full max-h-[850px] rounded-3xl flex flex-col overflow-hidden relative">
        
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-600/10 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-fuchsia-600/10 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="w-full p-4 flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-white/5 z-10">
            <div class="flex items-center gap-3">
                <div class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-purple-500"></span>
                </div>
                <h1 class="text-xl font-bold tracking-wider uppercase text-purple-400">Hexon // Interface</h1>
            </div>

            <div class="flex items-center gap-2 w-full sm:w-auto">
                <span class="text-xs uppercase text-slate-400 tracking-widest hidden md:inline">Core Model:</span>
                <select id="modelSelect" class="glass-input text-sm text-slate-200 rounded-xl px-3 py-2 cursor-pointer w-full sm:w-64">
                    <option value="meta-llama/Meta-Llama-3-8B-Instruct">Loading models...</option>
                </select>
            </div>
        </div>

        <div id="chatStream" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 custom-scrollbar z-10">
            <div class="flex items-start gap-3 max-w-[85%]">
                <div class="glass-panel h-8 w-8 rounded-lg flex items-center justify-center text-xs text-purple-400 border border-purple-500/30 flex-shrink-0 font-mono">HX</div>
                <div class="glass-panel px-4 py-3 rounded-2xl rounded-tl-none border border-white/5 text-sm leading-relaxed text-slate-200">
                    System initialized. Hexon online. Awaiting data parameters or script instructions.
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-white/5 z-10">
            <form id="inputForm" class="flex items-center gap-3 relative">
                
                <button type="button" id="heartBtn" class="glass-input p-3 rounded-xl hover:text-rose-400 hover:border-rose-500/40 text-slate-400 flex items-center justify-center transition-all duration-300 group" title="Heart Matrix Diagnostics">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </button>

                <input type="text" id="userInput" placeholder="Transmit instruction packet to Hexon..." autocomplete="off" class="glass-input flex-1 px-4 py-3 rounded-xl text-sm placeholder-slate-500 text-slate-100">

                <button type="submit" class="bg-gradient-to-r from-purple-600 to-fuchsia-600 text-white p-3 rounded-xl hover:opacity-90 shadow-[0_0_15px_rgba(168,85,247,0.3)] flex items-center justify-center transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Point this directly to your deployed Vercel URL
        // Leave as empty string "" if deployed together in the same Vercel project
        const API_BASE_URL = ""; 

        const chatStream = document.getElementById('chatStream');
        const inputForm = document.getElementById('inputForm');
        const userInput = document.getElementById('userInput');
        const modelSelect = document.getElementById('modelSelect');
        const heartBtn = document.getElementById('heartBtn');

        // 1. Fetch live active open-source models for selector dropdown
        async function loadActiveModels() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/models`);
                const data = await res.json();
                
                if (data.models && data.models.length > 0) {
                    modelSelect.innerHTML = ''; // Clear default option
                    data.models.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model;
                        option.textContent = model;
                        // Default selection preference setting
                        if(model === "meta-llama/Meta-Llama-3-8B-Instruct") option.selected = true;
                        modelSelect.appendChild(option);
                    });
                }
            } catch (err) {
                console.error("Failed model network synchronization:", err);
                modelSelect.innerHTML = '<option value="meta-llama/Meta-Llama-3-8B-Instruct">meta-llama/Meta-Llama-3-8B-Instruct (Default)</option>';
            }
        }

        // 2. DOM manipulation for adding conversational rows
        function appendMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex items-start gap-3 max-w-[85%] ${isUser ? 'ml-auto flex-row-reverse' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = `glass-panel h-8 w-8 rounded-lg flex items-center justify-center text-xs flex-shrink-0 font-mono ${isUser ? 'text-fuchsia-400 border-fuchsia-500/30' : 'text-purple-400 border-purple-500/30'}`;
            avatar.textContent = isUser ? 'US' : 'HX';

            const messageBox = document.createElement('div');
            messageBox.className = `glass-panel px-4 py-3 rounded-2xl text-sm leading-relaxed text-slate-200 border border-white/5 ${isUser ? 'rounded-tr-none bg-purple-950/20' : 'rounded-tl-none'}`;
            messageBox.innerText = text;

            wrapper.appendChild(avatar);
            wrapper.appendChild(messageBox);
            chatStream.appendChild(wrapper);
            
            // Auto scroll down stream
            chatStream.scrollTop = chatStream.scrollHeight;
        }

        // 3. Form submit handler processing network token loops
        inputForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // Display user message visually
            appendMessage(prompt, true);
            userInput.value = '';

            // Loading placeholder row
            const thinkingRow = document.createElement('div');
            thinkingRow.className = "flex items-start gap-3 text-xs text-slate-500 italic animate-pulse pl-11";
            thinkingRow.id = "hexon-thinking";
            thinkingRow.innerText = "Hexon parsing matrix data stream...";
            chatStream.appendChild(thinkingRow);
            chatStream.scrollTop = chatStream.scrollHeight;

            try {
                const response = await fetch(`${API_BASE_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: prompt,
                        model: modelSelect.value
                    })
                });
                
                const data = await response.json();
                document.getElementById('hexon-thinking').remove();

                if (data.response) {
                    appendMessage(data.response, false);
                } else if (data.error) {
                    appendMessage(`System Exception: ${data.error}`, false);
                }
            } catch (err) {
                document.getElementById('hexon-thinking').remove();
                appendMessage("Inference loop timed out or endpoint is offline.", false);
            }
        });

        // 4. Custom Heart Icon Matrix Diagnostic Action
        heartBtn.addEventListener('click', () => {
            appendMessage("[Diagnostic Command Transmitted]: Analyze custom interface performance matrix.", true);
            setTimeout(() => {
                appendMessage("UI matrix stable. Glassmorphism refraction levels optimal. Connection status clear.", false);
            }, 600);
        });

        // Initialize script loop routine
        loadActiveModels();
    </script>
</body>
</html>
